<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinh Veer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-bs-theme="light">
    <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Vinh Veer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto me-3 mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/">
                            <span>Trang chủ</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-disabled="true" href="blog.html">
                            <span>Bài đăng</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">
                            <span>Về tôi</span>
                        </a>
                    </li>
                    <li class="nav-item active-item">
                        <a class="nav-link" href="feature.html">
                            <span>Tính năng khác</span>
                        </a>
                    </li>
                </ul>
            </div>
            <button id="toggleMode" class="btn btn-outline-secondary toggle-mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Tính điểm trung bình môn</h1>
        <p>Chọn nút thêm môn học - điểm số để thêm, sau đó xem kết quả</p>
    </div>

    <div class="container mt-2">
        <div class="card">
            <div class="card-body">
                <div>Điểm trung bình hệ 10 - <span id="average-score-10" class="fs-5">0.00</span></div>
                <div>Điểm trung bình hệ 4 - <span id="average-score-4" class="fs-5">0.00</span></div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <button class="btn btn-outline-secondary mt-2 ms-md-2" data-bs-toggle="modal" data-bs-target="#courseModal"><i
                class="fa-solid fa-plus"></i> Thêm môn học - điểm
            số</button>
        <button id="clearAll" class="btn btn-outline-danger mt-2 ms-md-2"><i class="fa-solid fa-trash"></i> Xóa tất
            cả</button>
        <button id="exportExcel" class="btn btn-outline-success mt-2 ms-md-2"><i class="fa-solid fa-file-excel"></i>
            Xuất
            Excel</button>
        <button id="printPage" class="btn btn-outline-info mt-2 ms-md-2"><i class="fa-solid fa-print"></i> In</button>
    </div>

    <div class="container mt-2" id="courseTableBody">
        <!-- Course cards will be inserted here -->
    </div>

    <!-- Course Modal -->
    <div class="modal fade" id="courseModal" tabindex="-1" aria-labelledby="courseModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="courseForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="courseModalLabel">Thêm điểm</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="courseName" class="form-label">Tên môn học</label>
                            <input type="text" class="form-control" id="courseName" required>
                        </div>
                        <div class="mb-3">
                            <label for="credits" class="form-label">Tín chỉ</label>
                            <input type="number" class="form-control" id="credits" required>
                        </div>
                        <div class="mb-3">
                            <label for="score" class="form-label">Điểm</label>
                            <input type="text" class="form-control" id="score" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/toggle-mode.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="js/calc.js"></script>
</body>

</html>
