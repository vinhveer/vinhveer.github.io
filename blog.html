<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinh Veer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-bs-theme="light">
    <div class="background"></div>
    <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Vinh Veer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto me-3 mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/">
                            <span>Trang chủ</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active-item" aria-disabled="true" href="blog.html">
                            <span>Bài đăng</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feature.html">
                            <span>Tính năng khác</span>
                        </a>
                    </li>
                </ul>
            </div>
            <button id="toggleMode" class="btn btn-outline-secondary toggle-mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container mt-5">
        <h5 class="display-5">Tất cả bài đăng</h5>
        <form class="d-flex mt-4">
            <input id="search-input" class="form-control me-2" placeholder="Nhập vào đây để tìm kiếm">
        </form>
    </div>

    <div id="blogs-container" class="container mt-5">
        <!-- Blog cards will be inserted here by JavaScript -->
    </div>

    <div id="no-results" class="container mt-5 d-none">
        <h6>Không tìm thấy kết quả</h6>
    </div>

    <div class="footer">
        <div class="container mt-5 mb-5">
            <p>&copy; 2024 Vinh Veer. All rights reserved.</p>
        </div>
    </div>

    <script src="js/blog.js"></script>
    <script src="js/toggle-mode.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
