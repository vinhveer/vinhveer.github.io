    <!-- Bao gồm Showdown và highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        // Lấy giá trị của tham số 'file' từ URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Lấy file từ URL và fetch nội dung của nó
        const file = getQueryParam('file');
        if (file) {
            fetchMarkdown(file);
        } else {
            document.getElementById('content').innerHTML = '<p>Error: No file specified</p>';
        }

        async function fetchMarkdown(file) {
            try {
                const response = await fetch(file);
                const markdown = await response.text();

                // Tìm vị trí của dòng bắt đầu của nội dung thực
                const startIndex = markdown.indexOf('# ');

                // Nếu không tìm thấy dấu #, có thể là tệp không đúng định dạng, xử lý lỗi
                if (startIndex === -1) {
                    throw new Error('Invalid Markdown format: Missing main content.');
                }

                // Cắt bỏ các dòng meta-data
                const mainContent = markdown.substring(startIndex);

                // Chuyển đổi Markdown thành HTML
                const converter = new showdown.Converter();
                const htmlContent = converter.makeHtml(mainContent);
                document.getElementById('content').innerHTML = htmlContent;
            } catch (error) {
                console.error('Error fetching Markdown file:', error);
            }
        }
    </script>
    <script src="js/toggle-mode.js"></script>
