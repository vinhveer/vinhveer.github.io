<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinh Veer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-bs-theme="light">
    <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Vinh Veer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto me-3 mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/">
                            <span>Trang chủ</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-disabled="true" href="blog.html">
                            <span>Bài đăng</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">
                            <span>Về tôi</span>
                        </a>
                    </li>
                    <li class="nav-item active-item ">
                        <a class="nav-link" href="feature.html">
                            <span>Tính năng khác</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Feature</h1>
    </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <a class="card" href="calc-score.html">
                    <div class="card-body">
                        <h5 class="card-title">Tính điểm</h5>
                        <p class="card-text">Tính điểm trung bình học kỳ</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container mt-5 mb-5">
            <p>&copy; 2024 Vinh Veer. All rights reserved.</p>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleMode');
        const body = document.body;
        const navbar = document.querySelector('.navbar');
        const links = document.querySelectorAll('.navbar a, .btn-outline-success');

        // Hàm để cập nhật chủ đề dựa trên chế độ hệ thống
        function updateTheme() {
            const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const newTheme = prefersDarkScheme ? 'dark' : 'light';
            body.setAttribute('data-bs-theme', newTheme);

            if (newTheme === 'dark') {
                body.style.color = '#ffffff';
                navbar.style.color = '#ffffff';
                links.forEach(link => link.style.color = '#ffffff');
                toggleBtn.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.style.color = '#000000';
                navbar.style.color = '#000000';
                links.forEach(link => link.style.color = '#000000');
                toggleBtn.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // Cập nhật chủ đề khi trang tải lần đầu
        updateTheme();

        // Lắng nghe sự thay đổi của chế độ hệ thống
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener('change', updateTheme);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
