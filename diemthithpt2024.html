<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinh Veer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>

<body data-bs-theme="light">
    <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Vinh Veer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto me-3 mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/">
                            <span>Trang chủ</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-disabled="true" href="blog.html">
                            <span>Bài đăng</span>
                        </a>
                    </li>
                    <li class="nav-item active-item ">
                        <a class="nav-link" href="feature.html">
                            <span>Tính năng khác</span>
                        </a>
                    </li>
                </ul>
            </div>
            <button id="toggleMode" class="btn btn-outline-secondary toggle-mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Tra cứu điểm thi tốt nghiệp THPTQG 2024</h1>
        <p>Nhập số báo danh để tra cứu. <br> <b>Lưu ý: </b>Không bao gồm điểm sau phúc khảo.</p>
    </div>

    <div class="container mt-4">
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="rollNumber" placeholder="Số báo danh" required pattern="\d*">
        </div>
        <button class="btn btn-outline-success" id="searchButton"><i class="fa-solid fa-magnifying-glass"></i> Tra
            cứu</button>
    </div>

    <div class="container mt-4">
        <div id="loading" style="display: none;" class="container text-center mt-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Đang tra cứu ...</p>
        </div>
        <div id="result"></div>
    </div>

    <div class="footer">
        <div class="container mt-5 mb-5">
            <p>&copy; 2024 Vinh Veer. All rights reserved.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const rollNumberInput = document.getElementById('rollNumber');

            if (rollNumberInput) {
                rollNumberInput.addEventListener('input', function () {
                    this.value = this.value.replace(/\D/g, '');
                });
            }
        });

        document.getElementById('searchButton').addEventListener('click', function () {
            const rollNumber = document.getElementById('rollNumber').value;
            if (!rollNumber) {
                alert('Vui lòng nhập số báo danh.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').innerHTML = '';

            Papa.parse('https://vinhveer.github.io/file/diem_thi_thpt_2024.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    document.getElementById('loading').style.display = 'none';
                    const data = results.data;
                    const student = data.find(row => row.sbd === rollNumber);
                    if (student) {
                        let resultHTML = `<h3>Kết quả thi cho số báo danh ${rollNumber}</h3><table class="table table-striped"><thead><tr><th>Môn</th><th>Điểm</th></tr></thead><tbody>`;
                        // Bỏ qua cột đầu tiên
                        Object.entries(student).slice(1).forEach(([key, value]) => {
                            if (value) {
                                resultHTML += `<tr><td>${key}</td><td>${value}</td></tr>`;
                            }
                        });
                        resultHTML += '</tbody></table>';
                        document.getElementById('result').innerHTML = resultHTML;
                    } else {
                        document.getElementById('result').innerHTML = `<div class="alert alert-danger" role="alert">Không tìm thấy kết quả cho số báo danh ${rollNumber}.</div>`;
                    }
                }
            });
        });
    </script>

    <script src="js/toggle-mode.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
