<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinh Veer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-bs-theme="light">
    <div class="background"></div>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid ps-5 pe-5">
            <a class="navbar-brand" href="#">Vinh Veer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="about.html">About me</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-disabled="true">Blogs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-disabled="true" href="developers.html">Developers</a>
                    </li>
                </ul>
                <button class="btn"><i class="fas fa-moon toggle-btn" id="toggleMode"></i></button>
            </div>
        </div>
    </nav>

    <div class="profile-header container-fluid ps-5 pe-5 mt-5">
        <h3>Bạn tìm gì ở đây? Chẳng có gì ở đây cả :)))))</h3>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleMode');
        const body = document.body;
        const navbar = document.querySelector('.navbar');
        const links = document.querySelectorAll('.navbar a, .btn-outline-success');

        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-bs-theme', newTheme);

            if (newTheme === 'dark') {
                body.style.color = '#ffffff';
                navbar.style.color = '#ffffff';
                links.forEach(link => link.style.color = '#ffffff');
                toggleBtn.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.style.color = '#000000';
                navbar.style.color = '#000000';
                links.forEach(link => link.style.color = '#000000');
                toggleBtn.classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
